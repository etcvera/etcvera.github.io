<!DOCTYPE html>
<html class="theme-auto" lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Page Title -->
    <title>etcvera | Jay's Creator Hub</title>
    <link rel="icon" type="image/x-icon" href="/images/avatar.png">

    <!-- Meta Description -->
    <meta name="description" content="Official hub for etcvera. Connect with Jay across YouTube, X, Instagram, TikTok, and Pinterest.">

    <!-- Keywords -->
    <meta name="keywords" content="etcvera, Jay, AI music, trading, creator hub">

    <!-- Canonical URL -->
    <meta rel="canonical" href="https://etcvera.com">

    <!-- Author Information -->
    <meta name="author" content="Jay">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">

  </head>

<body>

    <div class="container">
        <div class="column">

            <!-- Avatar Image -->
            <img class="avatar avatar--rounded" src="images/avatar.png" srcset="images/avatar@2x.png 2x" alt="etcvera logo">

            <!-- Brand Name -->
            <h1>
              <div>etcvera</div>
            </h1>

            <!-- Description -->
            <p>Creator hub for AI music, trading insights, and daily updates.</p>

            <!-- Buttons -->
            <div class="button-stack" role="navigation">

              <!-- YouTube -->
              <a class="button button-yt" href="https://www.youtube.com/channel/UCG8VQOKHOVWhksQdUu0lDNA" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/youtube.svg" alt="YouTube Logo">YouTube
              </a>

              <!-- X (Twitter) -->
              <a class="button button-x" href="https://x.com/ectvera" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/x.svg" alt="X Logo">Follow on X
              </a>

              <!-- Instagram -->
              <a class="button button-instagram" href="https://www.instagram.com/etcvera/" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/instagram.svg" alt="Instagram Logo">Instagram
              </a>

              <!-- TikTok -->
              <a class="button button-tiktok" href="https://www.tiktok.com/@etcvera" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/tiktok.svg" alt="TikTok Logo">TikTok
              </a>

              <!-- Pinterest -->
              <a class="button button-pinterest" href="https://www.pinterest.com/etcvera/" target="_blank" rel="noopener" role="button">
                <img class="icon" aria-hidden="true" src="images/icons/pinterest.svg" alt="Pinterest Logo">Pinterest
              </a>

            </div>

            <footer>
              <a href="privacy.html">Privacy Policy</a> | &copy; 2026 etcvera
            </footer>

        </div>
    </div>

</body>
</html>
